name: "📈 Strategy / LEAN Task (Phase 0)"
description: "Tasks for LEAN engine, Spider Wave strategy, fee model, symbol mapper, backtesting"
title: "[Quant] "
labels: ["phase-0", "strategy", "lean"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        **Assign to Copilot → Select agent: `quant-strategy`**
        
        The `quant-strategy` agent knows:
        - LEAN subprocess pattern (config.json → Docker → result.json)
        - Narang's 4-component framework (Alpha/Risk/Portfolio/Execution)
        - Versioned fee model (STT changed Oct 2024)
        - Symbol mapper round-trip (Dhan ↔ LEAN Symbol)
        - Davey/López de Prado 5-gate validation

  - type: textarea
    id: task
    attributes:
      label: "What needs to be built"
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: "Acceptance criteria"
    validations:
      required: true

  - type: checkboxes
    id: components
    attributes:
      label: "Which components are involved?"
      options:
        - label: "Symbol mapper (Dhan ↔ LEAN Symbol)"
        - label: "Fee model (versioned STT)"
        - label: "Spider Wave alpha model"
        - label: "LEAN subprocess wrapper"
        - label: "Validation (Monte Carlo / CPCV / WFO)"

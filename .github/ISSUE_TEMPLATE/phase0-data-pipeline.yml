name: "📊 Data Pipeline Task (Phase 0)"
description: "Tasks for bhavcopy downloader, intraday downloader, instrument master, LEAN writer"
title: "[Data] "
labels: ["phase-0", "data-pipeline"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        **Assign to Copilot → Select agent: `data-pipeline`**
        
        The `data-pipeline` agent knows:
        - NSE Bhavcopy URL and parsing
        - Dhan API rate limits (8 req/sec safe, 20 max)
        - SQLite job queue pattern (resumable downloads)
        - QuestDB ILP ingestion (port 9009)
        - LEAN data format (10000× prices, ms timestamps)
  
  - type: textarea
    id: task
    attributes:
      label: "What needs to be built"
      description: "Describe exactly what file(s) to create or modify"
      placeholder: "Build data-pipeline/bhavcopy_downloader.py"
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: "Acceptance criteria"
      description: "How do we know this is done?"
      placeholder: |
        - Running `python bhavcopy_downloader.py --date 2024-12-31` completes without error
        - `SELECT count() FROM ohlcv_daily` in QuestDB shows 2000+ rows
        - Local cache created at data/raw/bhavcopy/equity_2024-12-31.csv.gz
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: "Relevant context from CONTEXT.md"
      description: "Which sections of CONTEXT.md are most relevant?"
      value: "NSE Bhavcopy, Dhan API rate limits, QuestDB connection"
    validations:
      required: false

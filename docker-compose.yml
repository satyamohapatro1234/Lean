# Global AI Trading Platform — Docker Infrastructure
# Phase 0: LEAN + QuestDB + Redis
# Run: docker compose up -d
# Health check: docker compose ps

version: '3.9'

services:

  # QuantConnect LEAN Backtesting Engine
  lean:
    image: quantconnect/lean:latest
    container_name: lean-engine
    volumes:
      - ./strategies:/Lean/Algorithm.Python
      - ./data:/Lean/Data
      - ./lean-results:/Results
      - ./lean-config:/Lean/config
    environment:
      - PYTHONPATH=/Lean/Algorithm.Python
    networks:
      - trading-net
    restart: "no"  # LEAN runs on-demand, not as a daemon

  # QuestDB — Time-series database for tick and OHLCV data
  # Ports:
  #   9000 — HTTP query interface (browser UI at localhost:9000)
  #   9009 — InfluxDB Line Protocol (for data ingestion from Python)
  #   8812 — PostgreSQL wire protocol (for SQL queries from Python)
  questdb:
    image: questdb/questdb:latest
    container_name: questdb
    ports:
      - "9000:9000"   # Web console
      - "9009:9009"   # ILP ingestion
      - "8812:8812"   # PostgreSQL wire
    volumes:
      - questdb-data:/var/lib/questdb
    environment:
      - QDB_TELEMETRY_ENABLED=false
    networks:
      - trading-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis — Pub/sub for live tick distribution to frontend WebSocket clients
  # Also used as: job status cache, session state
  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    networks:
      - trading-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # Streamlit monitoring dashboard (Phase 0 only — developer tool)
  # Shows: download progress, QuestDB row counts, backtest results
  # NOT the production frontend (that is Phase 7)
  monitor:
    image: python:3.11-slim
    container_name: monitor
    working_dir: /app
    volumes:
      - .:/app
    ports:
      - "8501:8501"
    command: >
      bash -c "pip install streamlit questdb redis pandas plotly --quiet &&
               streamlit run monitor.py --server.port 8501 --server.address 0.0.0.0"
    networks:
      - trading-net
    depends_on:
      questdb:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  questdb-data:
    driver: local
  redis-data:
    driver: local

networks:
  trading-net:
    driver: bridge

name: "🧪 Testing Task"
description: "Write or run tests for any component"
title: "[Test] "
labels: ["testing"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        **Assign to Copilot → Select agent: `testing`**
        
        The `testing` agent knows:
        - Which tests to prioritize (fee model, lot sizes, LEAN format)
        - Exact test cases for SEBI changes (Oct 2024, Dec 2024)
        - How to test symbol mapper round-trips
        - Test report format for PRs

  - type: textarea
    id: what_to_test
    attributes:
      label: "What to test"
      description: "Which file, function, or component needs tests?"
    validations:
      required: true

  - type: checkboxes
    id: test_types
    attributes:
      label: "Which tests are needed?"
      options:
        - label: "LEAN price format (int × 10000)"
        - label: "Lot size date-awareness (Dec 2024 changes)"
        - label: "Fee schedule date-awareness (Oct 2024 STT change)"
        - label: "Symbol mapper round-trip"
        - label: "Bhavcopy parsing correctness"
        - label: "Data quality (no gaps, no outliers)"
        - label: "LEAN file readability"
